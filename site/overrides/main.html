{% extends "base.html" %}

{% block extrahead %}
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title }} - YAML Workflow Engine">
  <meta property="og:description" content="A lightweight Python workflow engine that executes tasks from YAML configuration files, with parallel processing, batch operations, and state management.">
  <meta property="og:url" content="{{ page.canonical_url }}">
  <meta property="og:site_name" content="YAML Workflow Engine">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title }} - YAML Workflow Engine">
  <meta name="twitter:description" content="A lightweight Python workflow engine that executes tasks from YAML configuration files.">
{% endblock %}
