name: Test Action

on:
  push:
    branches: [main]
    paths:
      - 'action.yml'
      - 'src/yaml_workflow/**'
      - '.github/workflows/test-action.yml'
  pull_request:
    paths:
      - 'action.yml'
      - 'src/yaml_workflow/**'

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Create a simple cross-platform workflow for testing
      - name: Create test workflow
        run: |
          cat > /tmp/test_action_workflow.yaml << 'WORKFLOW'
          name: Action Test
          params:
            greeting:
              type: string
              default: World
          steps:
            - name: greet
              task: echo
              inputs:
                message: "Hello, {{ args.greeting }}!"
            - name: compute
              task: python_code
              inputs:
                code: |
                  result = {"message": "Action works", "param": args.get("greeting", "?")}
          WORKFLOW

      - name: Run action with text format
        uses: ./
        id: text_run
        with:
          workflow: /tmp/test_action_workflow.yaml
          params: greeting=CI
          format: text

      - name: Verify text output is non-empty
        run: |
          echo "=== Text output ==="
          echo "${{ steps.text_run.outputs.result }}"
          test -n "${{ steps.text_run.outputs.result }}"
          echo "Text output OK"

      - name: Run action with JSON format
        uses: ./
        id: json_run
        with:
          workflow: /tmp/test_action_workflow.yaml
          params: greeting=CI
          format: json

      - name: Verify JSON output is valid and successful
        run: |
          echo "=== JSON output ==="
          echo '${{ steps.json_run.outputs.result }}'
          echo '${{ steps.json_run.outputs.result }}' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'success', f'Expected success, got {data[\"status\"]}'
          assert 'outputs' in data, 'Missing outputs key'
          assert 'workspace' in data, 'Missing workspace key'
          print('Action test passed: JSON output valid with status=success')
          "
