# Complex Workflow Example: Flows and Error Handling
name: Complex Flow and Error Handling Demo
description: >
  Demonstrates multiple execution flows and various error handling strategies
  (retry, continue, next/jump) within a single workflow.
  All steps use cross-platform tasks (no bash-specific commands).

params:
  flaky_mode:
    description: Controls the behavior of flaky_step. Set to 'fail' to force failure.
    default: success
  user_name:
    description: User name for processing.
    default: DemoUser

steps:
  # 1. Setup
  - name: setup_workspace
    task: python_code
    inputs:
      code: |
        import os
        ws = context["workspace"]
        print("Setting up workspace...")
        out_dir = os.path.join(ws, "output")
        os.makedirs(out_dir, exist_ok=True)
        with open(os.path.join(out_dir, "input_data.txt"), "w") as f:
            f.write("Initial data for " + args.get("user_name", "DemoUser"))
        result = {"status": "workspace ready"}

  # 2. Core Step 1
  - name: process_core_1
    task: echo
    inputs:
      message: "Core 1 OK"

  # 3. Flaky Step - Demonstrates Retry and Error Flow Jump (next)
  - name: flaky_step
    task: python_code
    inputs:
      code: |
        import os
        ws = context["workspace"]
        print("Attempting flaky step...")
        if args.get("flaky_mode") == "fail":
            raise RuntimeError("Flaky step is configured to fail!")
        else:
            out_dir = os.path.join(ws, "output")
            os.makedirs(out_dir, exist_ok=True)
            with open(os.path.join(out_dir, "processing_log.txt"), "a") as f:
                f.write("Flaky step succeeded.\n")
            print("Flaky step succeeded.")
            result = "Flaky Success"
    on_error:
      action: retry
      retry: 3
      delay: 1
      next: handle_flaky_error
      message: "Flaky step failed: {{ error.message }}"

  # 4. Optional Step - Demonstrates Continue on Error
  - name: optional_step
    task: python_code
    inputs:
      code: |
        print("Attempting optional step...")
        # Deliberately fail by reading a non-existent file
        with open("non_existent_file_that_does_not_exist.txt") as f:
            content = f.read()
        result = content
    on_error:
      action: continue
      message: "Optional step failed as expected, continuing..."

  # 5. Core Step 2
  - name: process_core_2
    task: python_code
    inputs:
      code: |
        import os
        ws = context["workspace"]
        print("Processing core step 2...")
        core1 = steps.get("process_core_1", {}).get("result", "N/A")
        flaky = steps.get("flaky_step", {}).get("result", "N/A")
        out_dir = os.path.join(ws, "output")
        os.makedirs(out_dir, exist_ok=True)
        with open(os.path.join(out_dir, "processing_log.txt"), "a") as f:
            f.write("Status from Core 1: " + str(core1) + "\n")
            f.write("Flaky step result: " + str(flaky) + "\n")
            f.write("Core 2 processed\n")
        result = {"status": "Core 2 complete"}

  # 6. Error Handler Step - Target for 'next' from flaky_step
  - name: handle_flaky_error
    task: echo
    inputs:
      message: |
        --------------------------------------------------
        ERROR HANDLED: Flaky step failed permanently.
        Step: {{ error.step }}
        Error: {{ error.message }}
        Run Number: {{ run_number }}
        User: {{ args.user_name }}
        See logs in workspace: {{ workspace }}
        --------------------------------------------------

  # 7. Cleanup Step
  - name: cleanup
    task: python_code
    inputs:
      code: |
        import os
        ws = context["workspace"]
        print("Performing cleanup...")
        output_dir = os.path.join(ws, "output")
        if os.path.isdir(output_dir):
            for name in sorted(os.listdir(output_dir)):
                path = os.path.join(output_dir, name)
                size = os.path.getsize(path)
                print("  " + name + ": " + str(size) + " bytes")
        print("Cleanup finished.")
        result = {"cleanup": "done"}

# Define Execution Flows
flows:
  default: full_run

  definitions:
    - full_run:
        - setup_workspace
        - process_core_1
        - flaky_step
        - optional_step
        - process_core_2
        - cleanup

    - core_only:
        - setup_workspace
        - process_core_1
        - flaky_step
        - process_core_2
        - cleanup

    - error_path:
        - handle_flaky_error
        - cleanup
