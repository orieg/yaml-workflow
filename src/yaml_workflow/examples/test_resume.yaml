# Resume Functionality Example
#
# This example demonstrates workflow resumption and state management:
# - Input validation with strict variable checking
# - State persistence and restoration
# - Error handling with detailed messages
# - Progress tracking and reporting
# - File-based state management
#
# Usage Examples:
# 1. Initial run (will fail without required_param):
#    yaml-workflow run test_resume.yaml
#
# 2. Resume after failure:
#    yaml-workflow run test_resume.yaml --resume required_param=test
#
# 3. Start from specific step:
#    yaml-workflow run test_resume.yaml --start-from process_data required_param=test

name: Test Resume
description: Demonstrates workflow resumption and state management

settings:
  error_handling:
    undefined_variables: strict  # Enable strict variable checking
    show_available: true        # Show available variables in errors

params:
  required_param:
    description: Required parameter for testing
    type: string
    minLength: 1
    required: true

steps:
  # Step 1: Validate required parameter and write check result
  - name: check_required_param
    task: python_code
    inputs:
      code: |
        import os
        ws = context["workspace"]
        val = args.get("required_param", "")
        out_dir = os.path.join(ws, "output")
        os.makedirs(out_dir, exist_ok=True)
        with open(os.path.join(out_dir, "check_result.txt"), "w") as f:
            f.write(val)
        print("Checked required_param: " + val)
        result = {"check_result": val}

  # Step 2: Process the data
  - name: process_data
    task: python_code
    inputs:
      code: |
        import os
        ws = context["workspace"]
        val = args.get("required_param", "")
        print("Processing data with " + val)
        out_dir = os.path.join(ws, "output")
        os.makedirs(out_dir, exist_ok=True)
        with open(os.path.join(out_dir, "result.txt"), "w") as f:
            f.write(val)
        result = {"process_result": val}

  # Step 3: Final verification
  - name: final_step
    task: python_code
    inputs:
      code: |
        import os
        ws = context["workspace"]
        print("Final step - reading result")
        with open(os.path.join(ws, "output", "result.txt")) as f:
            content = f.read().strip()
        print("Result: " + content)
        result = {"final_result": content}
