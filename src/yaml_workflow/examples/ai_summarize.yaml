name: AI Text Summarizer
description: >
  Summarize text using a local Ollama model or the Claude API.
  Demonstrates http.request auth, template prompts, python_code parsing,
  and the notify task for completion alerts.

  Usage:
    # Local Ollama (no API key needed — install from https://ollama.ai):
    yaml-workflow run ai_summarize.yaml text="The quick brown fox..."

    # Anthropic Claude API:
    yaml-workflow run ai_summarize.yaml \
      provider=claude \
      text="The quick brown fox..." \
      ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY

params:
  text:
    type: string
    description: Text to summarize
    required: true

  provider:
    type: string
    default: ollama
    description: "LLM provider: 'ollama' (local) or 'claude'"

  model:
    type: string
    default: ""
    description: >
      Model name. Defaults to 'llama3.2' for Ollama or
      'claude-3-5-haiku-20241022' for Claude.

  max_words:
    type: integer
    default: 100
    description: Approximate word limit for the summary

  output_file:
    type: string
    default: output/summary.md
    description: Where to write the summary

settings:
  log_level: INFO

steps:
  # ── Step 1: Resolve defaults and build the request payload ──────────────
  - name: prepare_request
    task: python_code
    inputs:
      code: |
        provider = args.get("provider", "ollama").lower()
        model    = args.get("model", "")
        text     = args.get("text", "")
        max_words = int(args.get("max_words", 100))

        prompt = (
            f"Summarize the following text in approximately {max_words} words. "
            f"Return only the summary, no preamble.\n\n"
            f"{text}"
        )

        if provider == "claude":
            model = model or "claude-3-5-haiku-20241022"
            result = {
                "provider": "claude",
                "model": model,
                "url": "https://api.anthropic.com/v1/messages",
                "body": {
                    "model": model,
                    "max_tokens": 512,
                    "messages": [{"role": "user", "content": prompt}],
                },
            }
        else:
            model = model or "llama3.2"
            result = {
                "provider": "ollama",
                "model": model,
                "url": "http://localhost:11434/api/generate",
                "body": {
                    "model": model,
                    "prompt": prompt,
                    "stream": False,
                },
            }

  # ── Step 2: Call the LLM API ─────────────────────────────────────────────
  # Ollama: no auth needed, runs locally on port 11434
  - name: call_llm_ollama
    task: http.request
    condition: "{{ steps.prepare_request.result.provider == 'ollama' }}"
    inputs:
      url:    "{{ steps.prepare_request.result.url }}"
      method: POST
      body:   "{{ steps.prepare_request.result.body }}"

  # Claude: bearer auth via ANTHROPIC_API_KEY env var + required version header
  - name: call_llm_claude
    task: http.request
    condition: "{{ steps.prepare_request.result.provider == 'claude' }}"
    inputs:
      url:    "{{ steps.prepare_request.result.url }}"
      method: POST
      body:   "{{ steps.prepare_request.result.body }}"
      auth:
        type:      bearer
        token_env: ANTHROPIC_API_KEY
      headers:
        anthropic-version: "2023-06-01"
        content-type: application/json

  # ── Step 3: Extract the summary text from the response ───────────────────
  - name: extract_summary
    task: python_code
    inputs:
      code: |
        import json

        provider = steps["prepare_request"]["result"]["provider"]

        if provider == "claude":
            raw = steps.get("call_llm_claude", {}).get("result", {})
            # Claude response: {"content": [{"type": "text", "text": "..."}]}
            content = raw.get("json") or {}
            parts = content.get("content", [])
            summary = parts[0].get("text", "").strip() if parts else raw.get("body", "")
        else:
            raw = steps.get("call_llm_ollama", {}).get("result", {})
            # Ollama response: {"response": "...", "done": true}
            content = raw.get("json") or {}
            summary = content.get("response", "").strip() or raw.get("body", "")

        model = steps["prepare_request"]["result"]["model"]
        result = {
            "summary": summary,
            "model": model,
            "provider": provider,
            "word_count": len(summary.split()),
        }

  # ── Step 4: Write the summary to a Markdown file ─────────────────────────
  - name: write_summary
    task: file.write
    inputs:
      path: "{{ args.output_file }}"
      content: |
        # Summary

        **Provider:** {{ steps.extract_summary.result.provider }}
        **Model:** {{ steps.extract_summary.result.model }}
        **Words:** {{ steps.extract_summary.result.word_count }}

        ---

        {{ steps.extract_summary.result.summary }}

  # ── Step 5: Log completion ────────────────────────────────────────────────
  - name: notify_done
    task: notify
    inputs:
      channel: log
      level: info
      message: >-
        Summary complete — {{ steps.extract_summary.result.word_count }} words
        via {{ steps.extract_summary.result.provider }}/{{ steps.extract_summary.result.model }}.
        Written to {{ args.output_file }}.
