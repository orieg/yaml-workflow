# Template Tasks Example
#
# Demonstrates template task features:
# - Jinja2 variable interpolation
# - Conditional rendering
# - Multiple output formats
#
# Usage:
#   yaml-workflow run template_tasks.yaml name=Alice role=admin

name: Template Tasks
description: Demonstrates template task features and best practices

params:
  name:
    description: User name
    type: string
    default: Alice
  role:
    description: User role
    type: string
    default: user
  template_format:
    description: Output format (html, markdown, text)
    type: string
    default: text

steps:
  # Step 1: Validate input
  - name: validate_input
    task: python_code
    inputs:
      code: |
        name = args.get("name", "Unknown")
        role = args.get("role", "user")
        if len(name) < 2:
            raise ValueError("Name must be at least 2 characters")
        result = {
            "name": name,
            "role": role,
            "is_admin": role == "admin",
        }

  # Step 2: Create profile using template
  - name: generate_profile
    task: template
    inputs:
      template: |
        {% set user = steps.validate_input.result.result %}
        {% if args.template_format == "html" %}
        <div class="profile">
          <h1>{{ user.name }}</h1>
          <p>Role: {{ user.role }}</p>
          {% if user.is_admin %}<p><strong>Admin access enabled</strong></p>{% endif %}
        </div>
        {% elif args.template_format == "markdown" %}
        # {{ user.name }}

        **Role:** {{ user.role }}
        {% if user.is_admin %}
        > Admin access enabled
        {% endif %}
        {% else %}
        USER PROFILE
        ============
        Name: {{ user.name }}
        Role: {{ user.role }}
        {% if user.is_admin %}Admin: Yes{% endif %}
        {% endif %}
      output_file: "output/profile.{{ args.template_format }}"
    condition: '{% if steps.validate_input.result.result.name %}True{% else %}False{% endif %}'

  # Step 3: Display generated profile
  - name: show_profile
    task: shell
    inputs:
      command: |
        echo "=== Generated Profile ({{ args.template_format }}) ==="
        cat "output/profile.{{ args.template_format }}"
        echo "=== End of Profile ==="
    condition: '{% if steps.validate_input.result.result.name %}True{% else %}False{% endif %}'
