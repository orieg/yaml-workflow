site_name: YAML Workflow Engine
site_url: https://orieg.github.io/yaml-workflow/
site_description: A lightweight Python workflow engine that executes tasks from YAML configuration files, with parallel processing, batch operations, and state management.
site_author: Nicolas Brousse
repo_url: https://github.com/orieg/yaml-workflow
repo_name: orieg/yaml-workflow

theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/orieg/yaml-workflow
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/yaml-workflow/
  generator: false
  copyright_extra: |
    Built by <a href="https://orieg.github.io/">Nicolas Brousse</a> · <a href="https://orieg.github.io/">More projects</a>

copyright: >
  Copyright &copy; 2024-2026 Nicolas Brousse ·
  <a href="https://opensource.org/licenses/MIT">MIT License</a> ·
  <a href="https://orieg.github.io/">More projects</a>

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_if_no_docstring: false
            filters: ["!^_"]
            heading_level: 2
            show_signature_annotations: true
  - gen-files:
      scripts:
        - scripts/gen_ref_nav.py
  - literate-nav
  - section-index

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guide:
      - Getting Started: guide/getting-started.md
      - Features: features.md
      - Core Concepts: guide/concepts.md
      - Workflow Structure: workflow-structure.md
      - Configuration: guide/configuration.md
      - CLI Usage: cli.md
      - Templating: guide/templating.md
      - State Management: state.md
      - Flow Control: guide/flows.md
      - Error Handling: guide/error-handling.md
      - Tasks:
          - Overview: tasks.md
          - Basic Tasks: guide/tasks/basic-tasks.md
          - File Operations: guide/tasks/file-operations.md
          - Shell Tasks: guide/tasks/shell-tasks.md
          - Python Tasks: guide/tasks/python-tasks.md
          - Batch Tasks: guide/tasks/batch-tasks.md
          - Template Tasks: guide/tasks/template-tasks.md
      - Task Development: guide/task-development.md
      - Plugin Authoring: guide/plugins.md
      - Architecture: guide/architecture.md
      - Dependencies: dependencies.md
  - Examples:
      - Basic Workflow: examples/basic-workflow.md
      - Hello World: examples/hello-world.md
      - Advanced Hello World: examples/advanced-hello-world.md
      - Resume Testing: examples/test-resume.md
      - Cookbook: examples/cookbook.md
  - API Reference: reference/SUMMARY.md
  - Contributing:
      - Development Guide: development.md
      - Testing Guide: testing.md
      - Coding Standards: contributing/coding-standards.md
      - Pull Requests: contributing/pull-requests.md 